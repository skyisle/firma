name: Publish to npm

on:
  release:
    types: [published]

jobs:
  ci:
    name: ubuntu-latest / Node 22
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: sudo apt-get install -y build-essential python3

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn workspace @firma/finnhub build

      - name: Build CLI
        run: yarn workspace firma-app build

      - name: Pack tarball
        run: npm pack
        working-directory: apps/cli

      - name: Install globally from tarball
        run: npm install -g apps/cli/firma-app-*.tgz

      - name: firma --version
        run: firma --version

      - name: firma show portfolio --json (empty DB)
        run: firma show portfolio --json --no-sync

      - name: firma show txns --json (empty DB)
        run: firma show txns --json

      - name: firma report --json (empty DB)
        run: firma report --json

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install build tools
        run: sudo apt-get install -y build-essential python3

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn workspace @firma/finnhub build

      - name: Build CLI
        run: yarn workspace firma-app build

      - name: Publish
        run: npm publish --access public
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
